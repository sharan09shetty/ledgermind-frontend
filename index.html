<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LedgerMind — Your finances, understood</title>
    <meta name="description" content="AI-powered expense tracking that reads your bank alerts, categorizes spending, and answers questions about your money." />
    <link rel="icon" href="/favicon.ico" sizes="16x16" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LedgerMind" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Apply the saved theme before first paint to avoid a light-mode flash
      try {
        var t = localStorage.getItem('lm-theme')
        if (t === 'dark' || t === 'midnight') document.documentElement.setAttribute('data-theme', t)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
