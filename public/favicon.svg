      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="56" fill="#0B1220"/>

  <!-- Single continuous glyph: an "L" (ledger rule) whose foot lifts into
